# Cloudflare Pages + Functions + D1 設定
name = "shisei-marketing-system"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

# D1 データベースのバインディング（コード内では env.DB で参照）
# database_id は `wrangler d1 create shisei_strategy` 実行後に表示される値を貼る
[[d1_databases]]
binding = "DB"
database_name = "shisei_strategy"
database_id = "PASTE_YOUR_D1_DATABASE_ID_HERE"

# 管理者トークン(ADMIN_TOKEN)は秘密情報なのでここには書かない。
# 次のいずれかで設定する:
#   ローカル: .dev.vars に  ADMIN_TOKEN=好きな長い文字列
#   本番:     Cloudflareダッシュボード > Pages > 設定 > 環境変数 で ADMIN_TOKEN を追加
