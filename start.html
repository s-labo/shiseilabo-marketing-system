<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ブランドを育てる｜シセイラボ 12STEP 戦略立案</title>
<meta name="description" content="12の問いに答えるごとに、あなたのブランドの庭が育っていく。シセイラボの12STEPメソッドで戦略書を作成。" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#14233A; --navy2:#1d3252; --ink:#14233A; --gold:#D96A2C; --gold2:#e58a4f;
    --bg:#f4f1ea; --paper:#ffffff; --line:#e6e1d5; --muted:#5b6675; --soft:#9aa3ad;
    --good:#1f9d6b; --shadow:0 14px 50px rgba(20,35,58,.10);
    --serif:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;
    --sans:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{overflow-x:clip}
  body{font-family:var(--sans);color:var(--ink);background:#fff;line-height:1.75;-webkit-font-smoothing:antialiased;overflow-x:clip}
  a{color:inherit;text-decoration:none}
  .hidden{display:none!important}

  /* header */
  header.bar{position:sticky;top:0;z-index:50;background:rgba(15,27,61,.96);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08)}
  header.bar .in{display:flex;align-items:center;gap:14px;height:60px;padding:0 18px;max-width:1240px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:10px;color:#fff}
  .brand img{height:38px;border-radius:7px;display:block}
  .brand .bt{font-size:9px;color:var(--soft);letter-spacing:.16em;line-height:1.3}
  .bar .spacer{flex:1}
  .bar .acts{display:flex;gap:8px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:7px;border:0;border-radius:40px;font-family:inherit;font-weight:700;cursor:pointer;transition:.2s;font-size:13px;padding:9px 16px}
  .btn.gh{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.22)}
  .btn.gh:hover{background:rgba(255,255,255,.16)}
  .btn.solid{background:var(--gold);color:#fff}
  .btn.solid:hover{background:var(--gold2)}
  .btn.dark{background:var(--navy);color:#fff}
  .btn.outline{background:#fff;border:1px solid var(--line);color:var(--navy)}
  .btn.outline:hover{border-color:var(--gold)}
  .btn.lg{padding:15px 30px;font-size:15px}
  .btn:disabled{opacity:.4;cursor:default}

  /* layout */
  .wrap{max-width:1240px;margin:0 auto;padding:0 18px}
  .layout{display:grid;grid-template-columns:1fr 420px;gap:38px;padding:26px 0 90px}

  /* ===== garden panel ===== */
  .gardenwrap{position:sticky;top:80px;align-self:start}
  .garden{border-radius:18px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line);background:#0f1c30}
  .garden svg{display:block;width:100%;height:auto}
  .gmeta{padding:18px 20px 20px;background:#fff}
  .gmeta .stage{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .gmeta .stage b{font-family:var(--serif);font-size:20px;color:var(--navy);font-weight:600}
  .gmeta .stage .lv{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:.08em}
  .gbar{height:9px;background:#eceae2;border-radius:20px;overflow:hidden;margin:13px 0 9px}
  .gbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#6f9e5e,#9ccb7e);transition:width .6s cubic-bezier(.2,.7,.2,1)}
  .gmeta .score{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
  .gmeta .score b{color:var(--navy)}
  .gmeta .enc{margin-top:12px;font-size:12.5px;color:var(--gold);font-weight:700;line-height:1.6}
  .grew{margin-top:10px;font-size:12px;color:var(--good);font-weight:700;min-height:1.2em;opacity:0;transition:.3s}
  .grew.show{opacity:1}

  /* growable svg elements */
  .grow{opacity:0;transform:translateY(10px) scale(.5);transform-box:fill-box;transform-origin:bottom center;transition:opacity .6s ease,transform .7s cubic-bezier(.34,1.56,.64,1)}
  .grow.in{opacity:1;transform:none}
  .sway{transform-box:fill-box;transform-origin:bottom center;animation:sway 5s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-1.5deg)}50%{transform:rotate(1.5deg)}}
  .float{animation:floaty 6s ease-in-out infinite}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* カワセミのアニメ */
  .kf{transform-box:fill-box;transform-origin:center bottom;animation:kfbob 3.6s ease-in-out infinite}
  @keyframes kfbob{0%,100%{transform:translateY(0) rotate(0deg)}22%{transform:translateY(-5px) rotate(-4deg)}40%{transform:translateY(-2px) rotate(0deg)}62%{transform:translateY(-4px) rotate(3deg)}}
  /* 季節・時間帯の浮遊パーティクル */
  .garden{position:relative}
  #gardenSvg{position:relative;line-height:0}
  .parts{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:2}
  .pt{position:absolute;top:-16px;width:10px;height:10px;opacity:0}
  .garden.petals .pt{opacity:.85;border-radius:72% 0 72% 0;background:#f3c0d2;animation:petalfall var(--d,8s) linear infinite var(--delay,0s)}
  .garden.dusk .pt{width:6px;height:6px;border-radius:50%;background:#ffd98a;box-shadow:0 0 9px #ffcf7a;animation:firefly var(--d,6s) ease-in-out infinite var(--delay,0s)}
  @keyframes petalfall{0%{transform:translateY(-16px) translateX(0) rotate(0);opacity:0}12%{opacity:.85}100%{transform:translateY(360px) translateX(36px) rotate(260deg);opacity:0}}
  @keyframes firefly{0%,100%{transform:translate(0,0);opacity:.15}50%{transform:translate(16px,-22px);opacity:.95}}
  /* 100%演出：紙吹雪＋バナー */
  .confpiece{position:fixed;top:-18px;width:10px;height:14px;z-index:96;pointer-events:none;animation:conffall linear forwards}
  @keyframes conffall{to{transform:translateY(110vh) rotate(800deg)}}
  .cbanner{position:fixed;inset:0;display:none;place-items:center;z-index:95;background:rgba(15,27,61,.4);padding:22px}
  .cbanner.show{display:grid}
  .cbanner .cc{background:#fff;border-radius:20px;padding:38px 32px;text-align:center;max-width:400px;box-shadow:var(--shadow);animation:pop .55s cubic-bezier(.34,1.56,.64,1)}
  .cbanner .cc .em{font-size:46px}
  .cbanner .cc h3{font-family:var(--serif);color:var(--navy);font-size:24px;margin:10px 0 6px}
  .cbanner .cc p{color:var(--muted);font-size:14px;margin-bottom:22px}
  @keyframes pop{from{transform:scale(.82);opacity:0}to{transform:none;opacity:1}}

  /* ===== question panel ===== */
  .panel{min-width:0}
  .pills{display:flex;gap:7px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:thin}
  .pill{flex:none;width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--muted);font-family:var(--serif);font-size:13px;cursor:pointer;transition:.15s;display:grid;place-items:center}
  .pill:hover{border-color:var(--gold)}
  .pill.cur{background:var(--navy);color:#fff;border-color:var(--navy)}
  .pill.done{background:var(--gold);border-color:var(--gold);color:#fff}
  .topbar{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  .topbar .prog{flex:1}
  .topbar .prog .t{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px}
  .topbar .prog .t b{color:var(--navy)}
  .pbar{height:7px;background:#eceae2;border-radius:20px;overflow:hidden}
  .pbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .4s}

  .badge{display:inline-block;font-size:11px;color:var(--gold);font-weight:700;letter-spacing:.12em;margin-top:6px}
  .panel h1{font-family:var(--serif);font-size:clamp(22px,2.6vw,29px);color:var(--navy);margin:8px 0 4px;font-weight:600;line-height:1.45}
  .purpose{color:var(--muted);font-size:14px;background:var(--bg);border-left:3px solid var(--gold);padding:14px 18px;border-radius:0 10px 10px 0;margin:16px 0 8px;line-height:1.85}
  .fwbar{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 26px}
  .chip{font-size:11px;background:#fbf7ec;border:1px solid #ecdcb4;color:#9a7a2a;padding:4px 10px;border-radius:20px}
  .advisorbox{margin:6px 0 22px;border:1px solid #cfe0d4;background:#f3faf5;border-radius:11px;padding:14px 16px}
  .advisorbox .h{font-size:12px;font-weight:700;color:var(--good);margin-bottom:6px}
  .advisorbox p{font-size:13.5px;color:#24503b;white-space:pre-wrap}

  .qblock{margin-bottom:26px;padding-bottom:26px;border-bottom:1px solid var(--line)}
  .qblock:last-of-type{border-bottom:0}
  .qblock label{display:block;font-weight:700;color:var(--navy);font-size:16px;margin-bottom:6px;line-height:1.6}
  .qblock label .qno{color:var(--gold);font-family:var(--serif);font-weight:600;font-size:16px;margin-right:6px}
  .qblock .hint{color:var(--soft);font-size:12.5px;margin-bottom:11px}
  .opts{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:12px}
  .opt{font-size:13.5px;background:#fff;border:1px solid var(--line);color:var(--ink);padding:9px 15px;border-radius:40px;cursor:pointer;font-family:inherit;transition:.15s}
  .opt:hover{border-color:var(--gold);color:var(--gold)}
  .opt.on{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:700}
  textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-family:inherit;font-size:15px;line-height:1.8;resize:vertical;min-height:88px;background:#fcfbf9;transition:.2s}
  textarea:focus{outline:0;border-color:var(--gold);background:#fff;box-shadow:0 0 0 3px rgba(217,106,44,.13)}
  .qscore{display:flex;align-items:center;gap:10px;margin-top:9px;max-height:0;overflow:hidden;opacity:0;transition:.25s}
  .qscore.show{max-height:40px;opacity:1}
  .qscore .dots{display:inline-flex;gap:4px}
  .qscore .dots i{width:8px;height:8px;border-radius:50%;background:#e2ddd0}
  .qscore .dots i.on{background:var(--gold)}
  .qscore .lab{font-size:12.5px;color:var(--good);font-weight:700}
  .qscore .lab b{color:var(--gold)}
  /* Q19連動の選択 */
  .fromq-empty{font-size:13px;color:var(--soft);background:var(--bg);border:1px dashed var(--line);border-radius:11px;padding:14px 16px;margin-bottom:10px}
  /* グループ選択（カテゴリ別キーワード） */
  .grp{margin-bottom:14px}
  .grp-h{font-size:12px;font-weight:700;color:var(--navy);letter-spacing:.04em;margin:0 0 8px;padding-left:10px;border-left:3px solid var(--gold)}
  /* 3セグメント（デモ×ジオ×サイコ） */
  .seg3{margin-top:4px}
  .seg-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;background:var(--bg);border-radius:11px;padding:10px 12px}
  .seg-n{flex:none;width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;font-family:var(--serif);font-size:13px;display:grid;place-items:center}
  .seg-row select{flex:1;min-width:118px;border:1px solid var(--line);border-radius:9px;padding:9px 10px;font-family:inherit;font-size:13.5px;background:#fff;cursor:pointer}
  .seg-x{color:var(--soft);font-weight:700;font-size:13px}
  /* A・B・C 3行入力 */
  .abc{margin-top:4px}
  .abc-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
  .abc-k{flex:none;width:30px;height:30px;margin-top:8px;border-radius:50%;background:var(--navy);color:#fff;font-family:var(--serif);font-weight:600;font-size:14px;display:grid;place-items:center}
  .abc-i{flex:1;border:1px solid var(--line);border-radius:12px;padding:13px 15px;font-family:inherit;font-size:15px;line-height:1.7;background:#fcfbf9;transition:.2s;min-height:46px;resize:vertical}
  .abc-i:focus{outline:0;border-color:var(--gold);background:#fff;box-shadow:0 0 0 3px rgba(217,106,44,.13)}

  /* ポジショニングマップ */
  .posmap{margin-top:4px}
  .pm-sels{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .pm-field{flex:1;min-width:150px}
  .pm-field span{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:5px}
  .pm-field select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:14px;background:#fff;cursor:pointer}
  .pm-ytop,.pm-ybot{text-align:center;font-size:11.5px;font-weight:700;color:var(--navy);max-width:320px;margin:0 auto}
  .pm-ytop{margin-bottom:6px}.pm-ybot{margin-top:6px}
  .pm-area{position:relative;width:320px;max-width:100%;padding-top:min(320px,100%);margin:0 auto;background:linear-gradient(180deg,#fbf7ef,#f0ebe0);border:1px solid var(--line);border-radius:12px;cursor:crosshair;touch-action:none}
  .pm-area .pm-cx{position:absolute;left:0;right:0;top:50%;height:1px;background:#dcd5c5}
  .pm-area .pm-cy{position:absolute;top:0;bottom:0;left:50%;width:1px;background:#dcd5c5}
  .pm-dot{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);min-width:52px;height:30px;padding:0 12px;border-radius:30px;background:var(--gold);color:#fff;border:2px solid #fff;font-size:11px;font-weight:700;font-family:inherit;cursor:grab;box-shadow:0 5px 14px rgba(217,106,44,.45);white-space:nowrap;touch-action:none}
  .pm-xrow{display:flex;justify-content:space-between;align-items:center;gap:8px;max-width:320px;margin:8px auto 0;font-size:11.5px;font-weight:700;color:var(--navy)}
  .pm-xrow .pm-xname{color:var(--soft);font-weight:700}
  .pm-read{margin:14px auto 0;max-width:340px;font-size:12.5px;color:var(--good);font-weight:700;line-height:1.6;text-align:center}
  .outputnote{margin-top:8px;padding:14px 18px;border:1px dashed var(--line);border-radius:11px;font-size:13.5px;color:var(--muted);background:var(--bg)}
  .outputnote b{color:var(--navy)}
  .foot{display:flex;justify-content:space-between;gap:12px;margin-top:32px;padding-top:24px;border-top:1px solid var(--line)}

  /* doc view */
  .doc{max-width:820px;margin:24px auto 90px;padding:0 18px}
  .doccard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:42px;box-shadow:var(--shadow)}
  .dochead{text-align:center;border-bottom:2px solid var(--navy);padding-bottom:24px;margin-bottom:26px}
  .dochead .t{font-family:var(--serif);font-size:26px;color:var(--navy)}
  .dochead .s{color:var(--muted);font-size:13px;margin-top:8px}
  .docscore{display:inline-flex;align-items:center;gap:16px;margin-top:18px;padding:14px 22px;border:1px solid var(--line);border-radius:12px;background:var(--bg);text-align:left}
  .docscore .g{font-family:var(--serif);font-size:38px;font-weight:700;color:var(--gold);width:48px;text-align:center;line-height:1}
  .docscore .sc{font-size:13px;color:var(--muted);line-height:1.6}
  .docscore .sc b{color:var(--navy);font-size:15px}
  .docstep{margin-bottom:26px;padding-bottom:22px;border-bottom:1px dashed var(--line)}
  .docstep h3{font-size:17px;color:var(--navy);display:flex;gap:10px;align-items:baseline}
  .docstep h3 .no{color:var(--gold);font-family:var(--serif);font-size:15px}
  .docqa .q{font-size:13px;font-weight:700;color:var(--ink);margin-top:13px}
  .docqa .a{font-size:14px;color:#333;white-space:pre-wrap;background:var(--bg);border-radius:8px;padding:10px 14px;margin-top:5px}
  .docqa .a.empty{color:var(--soft);font-style:italic;background:none;padding:5px 0}

  /* modals */
  .modal{position:fixed;inset:0;background:rgba(15,27,61,.55);display:none;place-items:center;z-index:90;padding:22px}
  .modal.show{display:grid}
  .modal .box{background:#fff;max-width:520px;width:100%;max-height:86vh;overflow:auto;border-radius:18px;padding:32px}
  .modal h3{font-family:var(--serif);color:var(--navy);font-size:22px}
  .modal .x{float:right;cursor:pointer;border:0;background:var(--bg);width:32px;height:32px;border-radius:50%;font-size:17px}
  .field{margin-top:16px}
  .field label{font-weight:700;font-size:14px;color:var(--navy)}
  .field input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin-top:6px;font-family:inherit;font-size:14px}
  .gterm{border-bottom:1px solid var(--line);padding:13px 0}
  .gterm b{color:var(--navy)} .gterm p{font-size:13.5px;color:var(--muted);margin-top:4px}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:13px 24px;border-radius:30px;font-size:14px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.3s;z-index:99}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:980px){
    .layout{grid-template-columns:1fr;gap:18px;padding-top:14px}
    .gardenwrap{position:static;order:-1}
    .garden svg{width:min(330px,82%);margin:0 auto}
    .garden{display:flex;flex-direction:column;align-items:center}
    .gmeta{width:100%}
    .wrap{padding-left:clamp(16px,5%,24px);padding-right:clamp(16px,5%,24px)}
    .doc{padding-left:clamp(16px,5%,24px);padding-right:clamp(16px,5%,24px)}
    .doccard{padding:26px}
    .bar .bt{display:none}
  }
</style>
</head>
<body>

<header class="bar">
  <div class="in">
    <a class="brand" href="index.html">
      <img src="logofile_logo.001.jpeg" alt="SHISEILABO" />
      <span class="bt">MARKETING<br>STRATEGY</span>
    </a>
    <div class="spacer"></div>
    <div class="acts">
      <button class="btn outline" id="soundBtn" onclick="toggleSound()" title="効果音 ON/OFF" style="padding:9px 12px">🔊</button>
      <button class="btn outline" onclick="openGlossary()">用語集</button>
      <button class="btn outline" onclick="showDoc()">📄 戦略書</button>
      <button class="btn solid" onclick="openSubmit()">☁️ 送信</button>
    </div>
  </div>
</header>

<!-- BUILD VIEW -->
<main id="view-build">
  <div class="wrap">
    <div class="layout">
      <!-- question panel -->
      <section class="panel">
        <div class="topbar">
          <div class="prog">
            <div class="t"><span id="stepLabel">STEP 1 / 12</span><span id="scoreLabel">完成度 0%</span></div>
            <div class="pbar"><i id="pbar"></i></div>
          </div>
        </div>
        <div class="pills" id="pills"></div>
        <div id="stepBody"></div>
      </section>
      <!-- garden panel -->
      <aside class="gardenwrap">
        <div class="garden">
          <div id="gardenSvg"></div>
          <div class="gmeta">
            <div class="stage"><b id="stageName">更地</b><span class="lv" id="stageLv">STAGE 0</span></div>
            <div class="gbar"><i id="gbar"></i></div>
            <div class="score"><span>育った要素 <b id="grownCount">0</b> / <span id="grownMax">18</span></span><span>完成度 <b id="scorePct2">0%</b></span></div>
            <div class="enc" id="gardenEnc">最初の問いに答えると、庭に芽が出ます。</div>
            <div class="grew" id="grewMsg"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>
</main>

<!-- DOC VIEW -->
<main id="view-doc" class="hidden">
  <div class="wrap" style="padding-top:18px"><button class="btn outline" onclick="showBuild()">← 立案に戻る</button></div>
  <div class="doc"><div class="doccard" id="docBody"></div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:22px;flex-wrap:wrap">
      <button class="btn outline lg" onclick="window.print()">🖨 印刷 / PDF</button>
      <button class="btn solid lg" onclick="openSubmit()">☁️ シセイラボに送信</button>
    </div>
  </div>
</main>

<!-- submit modal -->
<div class="modal" id="submitModal">
  <div class="box" style="max-width:520px">
    <button class="x" onclick="closeSubmit()">×</button>
    <h3>シセイラボに送信</h3>
    <p style="color:var(--muted);font-size:13px;margin-top:6px">作成中の戦略書をシセイラボへ送信し、専門家のアドバイスを依頼します。送信内容はシセイラボが保存・確認します。</p>
    <div class="field"><label>会社名 <span style="color:#c00">*</span></label><input id="smCompany" type="text" placeholder="株式会社○○" /></div>
    <div class="field"><label>連絡先メール <span style="color:#c00">*</span></label><input id="smEmail" type="email" placeholder="you@example.com" /></div>

<script>

   状態（index.html と同じ localStorage を共有）

const LS_KEY='shiseilabo_strategy_v1';
let state=load(), cur=0, prevGrown=0;
function load(){ try{ const d=JSON.parse(localStorage.getItem(LS_KEY)); return d&&d.answers?d:{answers:{},comments:{},cloud:null,updated:null}; }catch(e){ return {answers:{},comments:{},cloud:null,updated:null}; } }
function save(notify){ state.updated=new Date().toISOString(); localStorage.setItem(LS_KEY,JSON.stringify(state)); if(notify) toast('保存しました'); }
function ans(s,q){ return (state.answers[s]&&state.answers[s][q])||''; }
function setAns(s,q,v){ state.answers[s]=state.answers[s]||{}; state.answers[s][q]=v; }

/* ============================================================
   スコアリング & 成長
   ============================================================ */
function qPoints(t){ t=(t||'').trim(); if(!t) return 0; const n=t.length; if(n<15) return 6; if(n<60) return 9; return 12; }
function qLevel(t){ const p=qPoints(t); return p?(p===6?1:p===9?2:3):0; }
function qStart(no){ let n=0; for(const st of STEPS){ if(st.no===no) break; n+=st.questions.length; } return n; }
function totalQuestions(){ return STEPS.reduce((a,s)=>a+s.questions.length,0); }
function answeredCount(){ let c=0; STEPS.forEach(s=>{ const a=state.answers[s.no]||{}; s.questions.forEach(q=>{ if((a[q.id]||'').trim()) c++; }); }); return c; }
function totalScore(){ let s=0; STEPS.forEach(st=>{ const a=state.answers[st.no]||{}; st.questions.forEach(q=>{ s+=qPoints(a[q.id]); }); }); return s; }
function maxScore(){ return totalQuestions()*12; }
function scorePct(){ return Math.round(totalScore()/maxScore()*100); }
function gradeFor(p){ return p>=90?'S':p>=75?'A':p>=60?'B':p>=40?'C':'D'; }
function stepDone(no){ const a=state.answers[no]; return a&&Object.values(a).some(v=>v&&v.trim()); }
function encourageMsg(p){ if(p<=0)return 'さあ、最初の問いから。';if(p<25)return 'いいスタートです。';if(p<50)return '順調に育っています。';if(p<75)return '戦略の輪郭が見えてきました。';if(p<100)return 'あと少しで完成です！';return '完成度100%。庭が満開です！'; }

function stageFor(p){ let s=STAGES[0]; for(const st of STAGES){ if(p>=st.min) s=st; } return s; }

function flower(x,y,c){ return `<g transform="translate(${x},${y})"><rect x="-1.5" y="0" width="3" height="14" fill="#5b8a4c"/>${[0,72,144,216,288].map(a=>`<ellipse cx="0" cy="-7" rx="4" ry="7" fill="${c}" transform="rotate(${a})"/>`).join('')}<circle cx="0" cy="0" r="3.2" fill="#ffe08a"/></g>`; }

/* 時間帯（完成度で朝→昼→黄昏→祝祭へ） */
const SKY=[
  {p:0,  top:'#16294a',mid:'#3a4f6e',bot:'#f3e7d2',sun:'#e58a4f',sy:96 }, // 夜明け
  {p:16, top:'#1d3a5e',mid:'#5b7da0',bot:'#f6ecd6',sun:'#ffcf8a',sy:86 }, // 朝
  {p:36, top:'#2f6aa0',mid:'#9cc1de',bot:'#fbf3e0',sun:'#ffe1a8',sy:74 }, // 昼
  {p:56, top:'#2a4a78',mid:'#cf9362',bot:'#f7d6ad',sun:'#ff9e57',sy:118}, // 黄昏
  {p:80, top:'#1a2f52',mid:'#46608c',bot:'#ecd2a4',sun:'#ffb86b',sy:120}, // 夕暮れ
  {p:100,top:'#2a5690',mid:'#a8cbe6',bot:'#fff3d6',sun:'#ffd27a',sy:70 }, // 祝祭
];
function skyFor(p){ let s=SKY[0]; for(const x of SKY){ if(p>=x.p) s=x; } return s; }
function applySky(p){
  const s=skyFor(p);
  const set=(id,c)=>{ const e=document.getElementById(id); if(e) e.setAttribute('stop-color',c); };
  set('skyT',s.top); set('skyM',s.mid); set('skyB',s.bot);
  const sun=document.getElementById('sunC'), gl=document.getElementById('sunGlow');
  if(sun){ sun.setAttribute('fill',s.sun); sun.setAttribute('cy',s.sy); }
  if(gl){ gl.setAttribute('fill',s.sun); gl.setAttribute('cy',s.sy); }
  const g=document.querySelector('.garden');
  if(g){ g.classList.toggle('petals',p>=36&&p<70); g.classList.toggle('dusk',p>=70); }
}
function buildParticles(){
  const host=document.getElementById('gardenSvg'); if(!host||host.querySelector('.parts')) return;
  const d=document.createElement('div'); d.className='parts';
  for(let i=0;i<9;i++){ const s=document.createElement('span'); s.className='pt';
    s.style.left=(6+Math.random()*88)+'%'; s.style.setProperty('--d',(6+Math.random()*5).toFixed(1)+'s'); s.style.setProperty('--delay',(-Math.random()*8).toFixed(1)+'s'); d.appendChild(s); }
  host.appendChild(d);
}

/* 効果音（Web Audio・外部ファイル不要） */
let actx=null, soundOn=(localStorage.getItem('shisei_sound')||'on')==='on';
function ac(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==='suspended') actx.resume(); return actx; }
function tone(freq,dur,type,vol,when){ const a=ac(); if(!a||!soundOn) return; type=type||'sine'; vol=vol||0.05; when=when||0; const t=a.currentTime+when; const o=a.createOscillator(),g=a.createGain(); o.type=type; o.frequency.value=freq; o.connect(g); g.connect(a.destination); g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vol,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.03); }
function sfxPop(){ tone(523,0.12,'sine',0.04); }
function sfxGrow(){ tone(659,0.16,'triangle',0.05); tone(988,0.2,'sine',0.035,0.06); }
function sfxStep(){ [523,659,784].forEach((f,i)=>tone(f,0.24,'triangle',0.05,i*0.08)); }
function sfxFanfare(){ [523,659,784,1046,1318,1568].forEach((f,i)=>tone(f,0.55,'triangle',0.06,i*0.12)); }
function updateSoundBtn(){ const b=document.getElementById('soundBtn'); if(b) b.textContent=soundOn?'🔊':'🔇'; }
function toggleSound(){ soundOn=!soundOn; localStorage.setItem('shisei_sound',soundOn?'on':'off'); updateSoundBtn(); if(soundOn) sfxPop(); }

/* 100%演出 */
let _done100=false;
function confetti(){
  const cols=['#D96A2C','#e58a4f','#6fae5a','#9ccb7e','#f0a0c0','#ffd76a','#2f7d9e','#fff'];
  for(let i=0;i<70;i++){ const p=document.createElement('div'); p.className='confpiece';
    p.style.left=Math.random()*100+'vw'; p.style.background=cols[i%cols.length];
    p.style.animationDuration=(2.4+Math.random()*2.6).toFixed(2)+'s'; p.style.animationDelay=(Math.random()*0.6).toFixed(2)+'s';
    p.style.transform='rotate('+(Math.random()*360)+'deg)'; if(i%3===0) p.style.borderRadius='50%';
    document.body.appendChild(p); setTimeout(()=>p.remove(),5600); }
}
function celebrate(){ if(_done100) return; _done100=true;
  // 満開の祝祭空に
  const s=SKY[SKY.length-1], set=(id,c)=>{const e=document.getElementById(id);if(e)e.setAttribute('stop-color',c);};
  set('skyT',s.top); set('skyM',s.mid); set('skyB',s.bot);
  const g=document.querySelector('.garden'); if(g){ g.classList.remove('dusk'); g.classList.add('petals'); }
  confetti(); sfxFanfare(); setTimeout(()=>document.getElementById('cbanner').classList.add('show'),420);
}

function renderGarden(){
  const host=document.getElementById('gardenSvg');
  if(!host.dataset.built){ host.innerHTML=gardenSVG(); host.dataset.built='1'; buildParticles(); }
  const c=answeredCount(), p=scorePct();
  let grown=0;
  GROW.forEach((g,idx)=>{ const els=host.querySelectorAll('[data-i="'+idx+'"]'); const on=c>=g.th; els.forEach(e=>e.classList.toggle('in',on)); if(on) grown++; });
  document.getElementById('gbar').style.width=Math.round(grown/GROW.length*100)+'%';
  document.getElementById('grownCount').textContent=grown;
  document.getElementById('grownMax').textContent=GROW.length;
  document.getElementById('scorePct2').textContent=p+'%';
  const full=grown>=GROW.length, st=stageFor(p);
  document.getElementById('stageName').textContent=full?'満開の庭':st.name;
  document.getElementById('stageLv').textContent=full?'STAGE ★':st.lv;
  document.getElementById('gardenEnc').textContent=full?'庭が満開になりました！':encourageMsg(p);
  applySky(p);
  if(grown>prevGrown){
    sfxGrow();
    const justNames=GROW.filter(g=>c>=g.th).slice(prevGrown,grown).map(g=>g.name);
    const nm=justNames[justNames.length-1];
    if(nm){ const m=document.getElementById('grewMsg'); m.textContent='🌿 庭に「'+nm+'」が増えました！'; m.classList.add('show'); clearTimeout(window._gm); window._gm=setTimeout(()=>m.classList.remove('show'),3200); }
  }
  prevGrown=grown;
  if(grown>=GROW.length) celebrate();   // 庭が満開（全設問に回答）で祝祭
}

/* ============================================================
   描画：ピル・ステップ
   ============================================================ */
function renderPills(){
  const host=document.getElementById('pills');
  host.innerHTML=STEPS.map((s,i)=>`<button class="pill ${i===cur?'cur':''} ${stepDone(s.no)?'done':''}" onclick="goStep(${i})" title="STEP${s.no} ${s.title}">${stepDone(s.no)?'✓':s.no}</button>`).join('');
  const c=document.getElementById('scoreLabel'); c.innerHTML='完成度 <b>'+scorePct()+'%</b>・'+totalScore()+'pt';
  document.getElementById('stepLabel').textContent=`STEP ${cur+1} / 12`;
  document.getElementById('pbar').style.width=scorePct()+'%';
}
function goStep(i){ save(false); cur=Math.max(0,Math.min(STEPS.length-1,i)); renderStep(); window.scrollTo({top:0,behavior:'smooth'}); }
function nextStep(){ save(false); checkStepComplete(STEPS[cur].no); if(cur<STEPS.length-1) goStep(cur+1); else showDoc(); }
function prevStep(){ goStep(cur-1); }

/* 他設問の選択結果を選択肢にする設問（例：Q22←Q19） */
function fromqChips(s,q){
  const items=[...new Set(ans(s,q.source).split(/[、,\n]/).map(x=>x.trim()).filter(Boolean))];
  if(!items.length) return '<div class="fromq-empty">先に Q19 でブランド・エクイティを選ぶと、ここに選択肢が表示されます。</div>';
  const sel=ans(s,q.id).split(/[、,\n]/).map(x=>x.trim()).filter(Boolean);
  return '<div class="opts">'+items.map(o=>`<button type="button" class="opt${sel.includes(o)?' on':''}" onclick="pick(this,${s},'${q.id}','${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')+'</div>';
}
function refreshDependents(s,changedQid){
  const step=STEPS.find(x=>x.no===s); if(!step) return;
  step.questions.forEach(q=>{ if(q.type==='fromq'&&q.source===changedQid){ const el=document.getElementById('fromq-'+s+'-'+q.id); if(el) el.innerHTML=fromqChips(s,q); } });
}

/* 3セグメント設問（3行 × デモ×ジオ×サイコ） */
const SEG_DEMO=['20代女性','30代女性','40代以上女性','20代男性','30代男性','40代以上男性','学生','子育て世帯','共働き世帯','シニア層','単身者','高所得層','中間所得層','経営者・管理職','専門職','主婦・主夫'];
const SEG_GEO=['都市部','地方都市','郊外','首都圏','関西圏','地域密着（ローカル）','全国','オンライン中心','海外・インバウンド'];
const SEG_PSY=['健康志向','品質重視','コスパ重視','トレンド志向','安定志向','こだわり派','時短・利便性重視','環境・社会志向','自己投資型','体験重視','ブランド志向','保守的','革新的'];
function seg3HTML(s,q){
  const ol=(items,ph)=>`<option value="">${ph}</option>`+items.map(o=>`<option>${o}</option>`).join('');
  return `<div class="seg3" id="seg3-${s}-${q}">`+[0,1,2].map(r=>`<div class="seg-row"><span class="seg-n">${'①②③'[r]}</span><select class="seg-a" data-r="${r}">${ol(SEG_DEMO,'属性（デモ）')}</select><span class="seg-x">×</span><select class="seg-b" data-r="${r}">${ol(SEG_GEO,'地域（ジオ）')}</select><span class="seg-x">×</span><select class="seg-c" data-r="${r}">${ol(SEG_PSY,'価値観（サイコ）')}</select></div>`).join('')+`</div>`;
}
function seg3Init(s,q){
  const root=document.getElementById('seg3-'+s+'-'+q); if(!root) return;
  const key=s+'_'+q; state.seg3=state.seg3||{}; const rows=state.seg3[key]||[{},{},{}];
  root.querySelectorAll('.seg-row').forEach((row,r)=>{ const v=rows[r]||{}; row.querySelector('.seg-a').value=v.a||''; row.querySelector('.seg-b').value=v.b||''; row.querySelector('.seg-c').value=v.c||''; });
  const commit=()=>{ const out=[]; const txt=[];
    root.querySelectorAll('.seg-row').forEach((row,r)=>{ const a=row.querySelector('.seg-a').value,b=row.querySelector('.seg-b').value,c=row.querySelector('.seg-c').value; out[r]={a,b,c};
      const p=[a,b,c].filter(Boolean); if(p.length) txt.push('①②③'[r]+p.join('×')); });
    state.seg3[key]=out; setAns(s,q,txt.join(' ／ ')); updateQScore(s,q); renderPills(); renderGarden();
    clearTimeout(window._sv); window._sv=setTimeout(()=>save(false),400); };
  root.querySelectorAll('select').forEach(sel=>sel.addEventListener('change',commit));
}

/* A・B・C 3行入力設問 */
function abcHTML(s,q){
  return `<div class="abc" id="abc-${s}-${q}">`+['A','B','C'].map(k=>
    `<div class="abc-row"><span class="abc-k">${k}</span><textarea class="abc-i" rows="1" data-k="${k}" placeholder="${k}：入力…"></textarea></div>`).join('')+`</div>`;
}
function abcInit(s,q){
  const root=document.getElementById('abc-'+s+'-'+q); if(!root) return;
  const key=s+'_'+q; state.abc=state.abc||{}; const v=state.abc[key]||{};
  root.querySelectorAll('.abc-i').forEach(t=>{ t.value=v[t.dataset.k]||''; });
  const commit=()=>{ const o={}; root.querySelectorAll('.abc-i').forEach(t=>{ o[t.dataset.k]=t.value; });
    state.abc[key]=o;
    const text=['A','B','C'].map(k=>o[k]&&o[k].trim()?k+'：'+o[k].trim():null).filter(Boolean).join(' ／ ');
    setAns(s,q,text); updateQScore(s,q); renderPills(); renderGarden();
    clearTimeout(window._sv); window._sv=setTimeout(()=>save(false),500); };
  root.querySelectorAll('.abc-i').forEach(t=>t.addEventListener('input',commit));
}

/* ポジショニングマップ設問 */
const POS_AXES=[
  {n:'価格',lo:'低い',hi:'高い'},{n:'品質',lo:'低い',hi:'高い'},{n:'専門性',lo:'汎用的',hi:'専門的'},
  {n:'対象',lo:'マス（大衆）',hi:'ニッチ（特化）'},{n:'デザイン',lo:'機能重視',hi:'情緒・世界観重視'},
  {n:'提供形態',lo:'オンライン',hi:'オフライン'},{n:'価格帯',lo:'手頃',hi:'プレミアム'},
  {n:'サポート',lo:'セルフ',hi:'手厚い'},{n:'認知度',lo:'低い',hi:'高い'},{n:'革新性',lo:'保守的',hi:'革新的'},
  {n:'カスタム性',lo:'標準',hi:'オーダーメイド'}
];
function posmapHTML(s,q){
  const opt=sel=>POS_AXES.map((a,i)=>`<option value="${i}">${a.n}（${a.lo}↔${a.hi}）</option>`).join('');
  return `<div class="posmap" id="pm-${s}-${q}">
    <div class="pm-sels">
      <div class="pm-field"><span>横軸（X）</span><select class="pm-x">${opt()}</select></div>
      <div class="pm-field"><span>縦軸（Y）</span><select class="pm-y">${opt()}</select></div>
    </div>
    <div class="pm-ytop"></div>
    <div class="pm-area"><span class="pm-cx"></span><span class="pm-cy"></span><button type="button" class="pm-dot">自社</button></div>
    <div class="pm-ybot"></div>
    <div class="pm-xrow"><span class="pm-xlo"></span><span class="pm-xname"></span><span class="pm-xhi"></span></div>
    <div class="pm-read"></div>
  </div>`;
}
function posmapInit(s,q){
  const root=document.getElementById('pm-'+s+'-'+q); if(!root) return;
  const xs=root.querySelector('.pm-x'), ys=root.querySelector('.pm-y'), area=root.querySelector('.pm-area'), dot=root.querySelector('.pm-dot');
  const key=s+'_'+q; state.posmap=state.posmap||{};
  const saved=state.posmap[key]; let touched=!!saved;
  const st=saved||{xi:0,yi:1,xv:50,yv:50};
  xs.value=st.xi; ys.value=st.yi; let xv=st.xv, yv=st.yv;
  const place=()=>{ dot.style.left=xv+'%'; dot.style.top=(100-yv)+'%'; };
  const labels=()=>{ const X=POS_AXES[+xs.value], Y=POS_AXES[+ys.value];
    root.querySelector('.pm-ytop').textContent='▲ '+Y.n+'：'+Y.hi;
    root.querySelector('.pm-ybot').textContent='▼ '+Y.n+'：'+Y.lo;
    root.querySelector('.pm-xlo').textContent='◀ '+X.lo;
    root.querySelector('.pm-xname').textContent='横：'+X.n;
    root.querySelector('.pm-xhi').textContent=X.hi+' ▶'; };
  const commit=()=>{ const X=POS_AXES[+xs.value], Y=POS_AXES[+ys.value];
    const xPole=xv>=50?X.hi:X.lo, yPole=yv>=50?Y.hi:Y.lo;
    const text='X軸：'+X.n+'（'+X.lo+'↔'+X.hi+'）／Y軸：'+Y.n+'（'+Y.lo+'↔'+Y.hi+'）／自社の位置：横は「'+xPole+'」寄り・縦は「'+yPole+'」寄り';
    root.querySelector('.pm-read').textContent='📍 '+text;
    setAns(s,q,text); state.posmap[key]={xi:+xs.value,yi:+ys.value,xv:Math.round(xv),yv:Math.round(yv)};
    updateQScore(s,q); renderPills(); renderGarden(); clearTimeout(window._sv); window._sv=setTimeout(()=>save(false),400); };
  const at=e=>{ const r=area.getBoundingClientRect(); xv=Math.max(0,Math.min(100,(e.clientX-r.left)/r.width*100)); yv=Math.max(0,Math.min(100,100-(e.clientY-r.top)/r.height*100)); touched=true; place(); commit(); };
  area.addEventListener('pointerdown',e=>{ try{area.setPointerCapture(e.pointerId);}catch(_){} at(e); });
  area.addEventListener('pointermove',e=>{ if(e.buttons) at(e); });
  xs.addEventListener('change',()=>{ labels(); if(touched) commit(); });
  ys.addEventListener('change',()=>{ labels(); if(touched) commit(); });
  labels(); place(); if(touched){ root.querySelector('.pm-read').textContent='📍 '+ans(s,q); }
}

function renderStep(){
  const s=STEPS[cur], ph=PHASES.find(p=>p.key===s.phase), comment=(state.comments&&state.comments[s.no])||'';
  document.getElementById('stepBody').innerHTML=`
    <div class="badge">${ph.no}・${ph.name}　|　STEP ${s.no} / 12</div>
    <h1>${s.title}</h1>
    <div class="purpose">🎯 ${s.purpose}</div>
    <div class="fwbar">${s.frameworks.map(f=>`<span class="chip">#${f}</span>`).join('')}</div>
    ${comment?`<div class="advisorbox"><div class="h">🧭 シセイラボからのアドバイス</div><p>${esc(comment)}</p></div>`:''}
    ${s.questions.map((q,i)=>{
      const val=ans(s.no,q.id), sel=val.split(/[、,\n]/).map(x=>x.trim()).filter(Boolean);
      const head=`<label><span class="qno">Q${qStart(s.no)+i+1}.</span>${q.label}</label><div class="hint">${q.hint}</div>`;
      if(q.type==='posmap'){ return `<div class="qblock">${head}${posmapHTML(s.no,q.id)}<div class="qscore" id="qs-${s.no}-${q.id}"></div></div>`; }
      if(q.type==='abc'){ return `<div class="qblock">${head}${abcHTML(s.no,q.id)}<div class="qscore" id="qs-${s.no}-${q.id}"></div></div>`; }
      if(q.type==='seg3'){ return `<div class="qblock">${head}${seg3HTML(s.no,q.id)}<div class="qscore" id="qs-${s.no}-${q.id}"></div></div>`; }
      if(q.type==='fromq'){ return `<div class="qblock">${head}<div class="fromq" id="fromq-${s.no}-${q.id}">${fromqChips(s.no,q)}</div>
        <textarea data-s="${s.no}" data-q="${q.id}" placeholder="選択がここに入ります（自由に追記・編集もOK）">${esc(val)}</textarea>
        <div class="qscore" id="qs-${s.no}-${q.id}"></div></div>`; }
      if(q.type==='grouped'){ const grps=q.groups.map(g=>`<div class="grp"><div class="grp-h">${g.name}</div><div class="opts">${g.items.map(o=>`<button type="button" class="opt${sel.includes(o)?' on':''}" onclick="pick(this,${s.no},'${q.id}','${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div></div>`).join('');
        return `<div class="qblock">${head}${grps}
          <textarea data-s="${s.no}" data-q="${q.id}" placeholder="選択がここに入ります（自由に追記・編集もOK）">${esc(val)}</textarea>
          <div class="qscore" id="qs-${s.no}-${q.id}"></div></div>`; }
      const opts=q.options?`<div class="opts">${q.options.map(o=>`<button type="button" class="opt${sel.includes(o)?' on':''}" onclick="pick(this,${s.no},'${q.id}','${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>`:'';
      return `<div class="qblock">${head}${opts}
        <textarea data-s="${s.no}" data-q="${q.id}" placeholder="ここに自社の状況を入力…">${esc(val)}</textarea>
        <div class="qscore" id="qs-${s.no}-${q.id}"></div>
      </div>`;
    }).join('')}
    <div class="outputnote">📦 <b>このSTEPの成果物：</b>${s.output}</div>
    <div class="foot">
      <button class="btn outline" ${cur===0?'disabled':''} onclick="prevStep()">← 前へ</button>
      ${cur===STEPS.length-1?`<button class="btn solid" onclick="showDoc()">戦略書を見る 📄</button>`:`<button class="btn dark" onclick="nextStep()">保存して次へ →</button>`}
    </div>`;
  document.querySelectorAll('#stepBody textarea').forEach(t=>{
    t.addEventListener('input',e=>{ const sn=+e.target.dataset.s,qid=e.target.dataset.q; const had=ans(sn,qid).trim(); setAns(sn,qid,e.target.value); if(!had&&e.target.value.trim()) sfxPop(); updateQScore(sn,qid); refreshDependents(sn,qid); renderPills(); renderGarden(); clearTimeout(window._sv); window._sv=setTimeout(()=>{ save(false); checkStepComplete(sn); },600); });
  });
  s.questions.forEach(q=>{ if(q.type==='posmap') posmapInit(s.no,q.id); if(q.type==='abc') abcInit(s.no,q.id); if(q.type==='seg3') seg3Init(s.no,q.id); updateQScore(s.no,q.id); });
  renderPills(); renderGarden();
}
function pick(el,s,q,text){
  const ta=document.querySelector(`#stepBody textarea[data-s="${s}"][data-q="${q}"]`); if(!ta) return;
  let parts=ta.value.split(/[、,\n]/).map(x=>x.trim()).filter(Boolean); const i=parts.indexOf(text);
  if(i>=0){parts.splice(i,1);el.classList.remove('on');}else{parts.push(text);el.classList.add('on');}
  ta.value=parts.join('、'); setAns(s,q,ta.value); sfxPop(); updateQScore(s,q); refreshDependents(s,q); renderPills(); renderGarden();
  clearTimeout(window._sv); window._sv=setTimeout(()=>{save(false);checkStepComplete(s);},400);
}
function updateQScore(s,q){
  const el=document.getElementById('qs-'+s+'-'+q); if(!el) return;
  const t=ans(s,q), lv=qLevel(t), p=qPoints(t);
  if(!lv){ el.className='qscore'; el.innerHTML=''; return; }
  const lab=lv===1?'記入OK ― もう少し具体的に書くと精度UP':lv===2?'いいですね':'充実した回答です';
  el.innerHTML=`<span class="dots">${[1,2,3].map(i=>`<i class="${i<=lv?'on':''}"></i>`).join('')}</span><span class="lab">${lab} <b>+${p}pt</b></span>`;
  el.className='qscore show';
}
const _celebrated=new Set();
function checkStepComplete(no){
  const s=STEPS.find(x=>x.no===no), a=state.answers[no]||{};
  const all=s.questions.every(q=>(a[q.id]||'').trim());
  if(all&&!_celebrated.has(no)){ _celebrated.add(no); const g=s.questions.reduce((p,q)=>p+qPoints(a[q.id]),0); sfxStep(); toast(`🎉 STEP${no} 完了！ +${g}pt 庭が育ちました`); }
  else if(!all){ _celebrated.delete(no); }
}

/* ============================================================
   戦略書
   ============================================================ */
function showDoc(){ document.getElementById('view-build').classList.add('hidden'); document.getElementById('view-doc').classList.remove('hidden'); renderDoc(); window.scrollTo(0,0); }
function showBuild(){ document.getElementById('view-doc').classList.add('hidden'); document.getElementById('view-build').classList.remove('hidden'); window.scrollTo(0,0); }
function renderDoc(){
  const d=state.updated?new Date(state.updated).toLocaleDateString('ja-JP'):'—', pct=scorePct();
  document.getElementById('docBody').innerHTML=`
    <div class="dochead"><div class="t">マーケティング戦略書</div>
      <div class="s">SHISEILABO 12STEP METHOD　|　作成日：${d}</div>
      <div class="docscore"><span class="g">${gradeFor(pct)}</span><span class="sc"><b>完成度スコア ${pct}%</b>（${totalScore()} / ${maxScore()} pt）<br>${encourageMsg(pct)}</span></div>
    </div>
    ${PHASES.map(ph=>STEPS.filter(s=>s.phase===ph.key).map(s=>{
      const a=state.answers[s.no]||{}, cm=(state.comments&&state.comments[s.no])||'';
      return `<div class="docstep"><h3><span class="no">STEP ${s.no}</span> ${s.title}</h3><div class="docqa">
        ${s.questions.map((q,i)=>{ const v=(a[q.id]||'').trim(); return `<div class="q">Q${qStart(s.no)+i+1}. ${q.label}</div><div class="a ${v?'':'empty'}">${v?esc(v):'（未入力）'}</div>`; }).join('')}
        </div>${cm?`<div class="advisorbox" style="margin-top:14px"><div class="h">🧭 アドバイス</div><p>${esc(cm)}</p></div>`:''}</div>`;
    }).join('')).join('')}`;
}

/* ============================================================
   クラウド送信・アドバイス
   ============================================================ */
async function api(path,opts){ try{ const r=await fetch(path,opts); let d=null; try{d=await r.json();}catch(e){} return {ok:r.ok&&d&&d.ok!==false,status:r.status,data:d}; }catch(e){ return {ok:false,status:0,data:null}; } }
function openSubmit(){ save(false); const c=state.cloud||{}; document.getElementById('smCompany').value=c.company||''; document.getElementById('smEmail').value=c.email||''; document.getElementById('smStatus').textContent=c.id?'※ 送信済み。再送信で最新内容に更新されます。':''; document.getElementById('submitModal').classList.add('show'); }
function closeSubmit(){ document.getElementById('submitModal').classList.remove('show'); }
async function cloudSubmit(){
  const company=document.getElementById('smCompany').value.trim(), email=document.getElementById('smEmail').value.trim(), st=document.getElementById('smStatus');
  if(!company||!email){ st.innerHTML='<span style="color:#c00">会社名とメールを入力してください</span>'; return; }
  const btn=document.getElementById('smBtn'); btn.disabled=true; btn.textContent='送信中…'; st.textContent='送信中…';
  const body={company,email,answers:state.answers}; if(state.cloud&&state.cloud.id){ body.id=state.cloud.id; body.token=state.cloud.token; }
  const r=await api('/api/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  btn.disabled=false; btn.textContent='送信する';
  if(!r.ok){ st.innerHTML=(r.status===0||r.status>=500)?'<span style="color:#c00">送信できませんでした（公開環境で有効）。</span>':'<span style="color:#c00">送信に失敗しました（'+((r.data&&r.data.error)||r.status)+'）</span>'; return; }
  state.cloud={id:r.data.id,token:r.data.token,company,email}; save(false);
  st.innerHTML='<span style="color:var(--good)">✓ 送信しました。アドバイスをお待ちください。</span>'; toast(r.data.updated?'内容を更新しました':'送信が完了しました'); setTimeout(closeSubmit,1500);
}
async function checkAdvice(){
  if(!(state.cloud&&state.cloud.id)){ toast('先に送信してください'); return; }
  toast('アドバイスを確認中…');
  const r=await api('/api/mine?id='+encodeURIComponent(state.cloud.id)+'&token='+encodeURIComponent(state.cloud.token));
  if(!r.ok){ toast((r.status>=500||r.status===0)?'公開後に利用できます':'取得できませんでした'); return; }
  state.comments=r.data.advice||{}; save(false);
  const n=Object.values(state.comments).filter(v=>v&&v.trim()).length;
  if(n>0){ toast(n+'件のアドバイスを受信しました'); renderStep(); } else toast('まだアドバイスは届いていません');
}

/* ============================================================
   用語集・ヘルパ
   ============================================================ */
function openGlossary(){ document.getElementById('glossaryBody').innerHTML=GLOSSARY.map(g=>`<div class="gterm"><b>${g[0]}</b><p>${g[1]}</p></div>`).join(''); document.getElementById('glossary').classList.add('show'); }
function closeGlossary(){ document.getElementById('glossary').classList.remove('show'); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
let _tt; function toast(m){ const e=document.getElementById('toast'); e.textContent=m; e.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>e.classList.remove('show'),2800); }

/* init */
(function(){
  const m=location.hash.match(/s=(\d+)/); if(m){ const n=+m[1]; if(n>=1&&n<=STEPS.length) cur=n-1; }
  updateSoundBtn();
  // 読み込み時は効果音・演出を鳴らさない（庭の初期状態だけ反映）
  prevGrown=GROW.filter(g=>answeredCount()>=g.th).length;
  if(prevGrown>=GROW.length) _done100=true;   // 既に満開なら再演出しない
  renderStep();
})();
